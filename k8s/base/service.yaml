apiVersion: v1
kind: Service
metadata:
  name: botmother-engine
  namespace: botmother-engine
  labels:
    app.kubernetes.io/name: botmother-engine
spec:
  selector:
    app.kubernetes.io/name: botmother-engine
  ports:
    - name: webhook
      port: 8443
      targetPort: webhook
    - name: metrics
      port: 9090
      targetPort: metrics
