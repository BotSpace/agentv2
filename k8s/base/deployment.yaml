apiVersion: apps/v1
kind: Deployment
metadata:
  name: botmother-engine
  namespace: botmother-engine
  labels:
    app.kubernetes.io/name: botmother-engine
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: botmother-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: botmother-engine
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: engine
          image: botmother-engine-go:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: webhook
              containerPort: 8443
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: botmother-engine-config
            - secretRef:
                name: botmother-engine-secret
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: flow
              mountPath: /app/assets
              readOnly: true
      volumes:
        - name: flow
          configMap:
            name: botmother-flow
            items:
              - key: flow.json
                path: flow.json
