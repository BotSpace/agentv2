apiVersion: v1
kind: ConfigMap
metadata:
  name: botmother-engine-config
  namespace: botmother-engine
data:
  FLOW_FILE_PATH: /app/assets/flow.json
  LOG_LEVEL: info
  REDIS_ENABLED: "true"
  REDIS_ADDR: botmother-redis:6379
  REDIS_DB: "0"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  WEBHOOK_ENABLED: "false"
  WEBHOOK_PORT: "8443"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_PER_SEC: "20"
  RATE_LIMIT_BURST: "5"
  STATE_WAITING_TTL: "24"
  STATE_COMPLETED_TTL: "2"
  STATE_INACTIVE_TTL: "168"
  PLUGIN_URL: http://engine-plugin:8090
