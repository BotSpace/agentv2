apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentv2.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agentv2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "agentv2.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentv2.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: seed-flow
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp -n /seed/flow.json /app/data/flow.json && chown 10001:10001 /app/data/flow.json && chmod 664 /app/data/flow.json
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: flow-seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - bm-agent
          args:
            - api
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --flow
            - data/flow.json
            - --model
            - $(AGENT_MODEL)
            - --database-url
            - $(AGENT_DATABASE_URL)
            - --redis-url
            - $(AGENT_REDIS_URL)
            - --cors-origins
            - $(AGENT_CORS_ORIGINS)
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "agentv2.name" . }}-config
            - secretRef:
                name: {{ .Values.secret.name }}
                optional: {{ .Values.secret.optional }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agentv2.name" . }}-data
        - name: flow-seed
          configMap:
            name: {{ include "agentv2.name" . }}-flow-seed
            items:
              - key: flow.json
                path: flow.json
