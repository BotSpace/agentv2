apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentv2.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agentv2.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "agentv2.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
