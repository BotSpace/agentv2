namespace: botmother

nameOverride: agentv2

replicaCount: 1

image:
  repository: botmother-agent
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: agentv2-harbor-registry

service:
  port: 8000

config:
  AGENT_MODEL: qwen3.5:cloud
  AGENT_DATABASE_URL: sqlite:////app/data/agent_runs.db
  AGENT_REDIS_URL: redis://agentv2-redis:6379/0
  AGENT_CORS_ORIGINS: "*"
  IS_OLLAMA: "true"

secret:
  name: agentv2-secret
  optional: true

flow:
  seedJson: |
    {
      "nodes": [],
      "edges": []
    }

persistence:
  enabled: true
  size: 1Gi
  accessModes:
    - ReadWriteOnce

redis:
  enabled: true
  image: redis:7-alpine
  storageSize: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
  hosts:
    - host: agentv2.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

securityContext:
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch
