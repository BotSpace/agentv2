name: Build and Deploy Agentv2

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/chart/agentv2/values-prod.yaml"

permissions:
  contents: write
  packages: write

concurrency:
  group: agentv2-prod
  cancel-in-progress: false

env:
  REGISTRY: registry.iprogrammer.uz
  IMAGE_NAME: agentv2/botmother-agent
  PROD_VALUES: k8s/chart/agentv2/values-prod.yaml

jobs:
  build-and-update-manifest:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "tag=prod-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_NAME}:prod-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update prod image tag
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          path = Path(os.environ["PROD_VALUES"])
          tag = os.environ["IMAGE_TAG"]
          lines = path.read_text(encoding="utf-8").splitlines()
          updated = []
          in_image = False

          for line in lines:
              stripped = line.strip()
              if stripped == "image:":
                  in_image = True
                  updated.append(line)
                  continue
              if in_image and stripped.startswith("tag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  updated.append(f"{indent}tag: {tag}")
                  in_image = False
                  continue
              if in_image and stripped and not line.startswith(" "):
                  in_image = False
              updated.append(line)

          path.write_text("\n".join(updated) + "\n", encoding="utf-8")
          PY
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}

      - name: Commit prod image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$PROD_VALUES"
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "chore: deploy agentv2 ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
